<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apartments | P-rent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS ── */
        :root {
            --ink:      #0e0f0d;
            --paper:    #f5f2ec;
            --warm:     #ede9e1;
            --cream:    #faf8f4;
            --gold:     #b8860b;
            --gold-lt:  #d4a820;
            --gold-dim: rgba(184,134,11,0.15);
            --muted:    #7a7669;
            --border:   #d8d3c8;
            --danger:   #c0392b;
            --card:     #1a1c18;
            --surface:  #141610;
            --ff-disp:  'Cormorant Garamond', Georgia, serif;
            --ff-sans:  'Outfit', sans-serif;
            --radius:   12px;
            --trans:    0.28s cubic-bezier(.4,0,.2,1);
            --max-w:    1240px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--ink);
            color: var(--paper);
            font-family: var(--ff-sans);
            font-size: 15px;
            line-height: 1.65;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* grain + grid */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(184,134,11,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184,134,11,0.04) 1px, transparent 1px);
            background-size: 72px 72px;
            pointer-events: none; z-index: 0;
        }

        /* ── NAV ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(14,15,13,0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .navbar {
            max-width: var(--max-w); margin: 0 auto;
            padding: 0 2.5rem; height: 66px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo h1 {
            font-family: var(--ff-disp); font-size: 1.85rem;
            font-weight: 600; letter-spacing: 0.04em; color: var(--paper);
        }
        .logo h1 span { color: var(--gold); }
        .nav-links { list-style: none; display: flex; gap: 0.15rem; align-items: center; }
        .nav-links a {
            text-decoration: none; color: rgba(245,242,236,0.45);
            font-size: 0.84rem; font-weight: 500;
            padding: 0.45rem 1rem; border-radius: 6px;
            transition: color var(--trans), background var(--trans);
        }
        .nav-links a:hover { color: var(--paper); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--gold-lt); }

        /* ── MAIN ── */
        main { flex: 1; position: relative; z-index: 1; }

        /* ── PAGE HEADER ── */
        .page-hero {
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 5rem 2.5rem 4rem;
            max-width: var(--max-w); margin: 0 auto;
            animation: fadeUp 0.6s ease both;
        }
        .page-eyebrow {
            display: inline-flex; align-items: center; gap: 0.55rem;
            font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--gold-lt); margin-bottom: 0.75rem;
        }
        .page-eyebrow::before {
            content: ''; display: block; width: 24px; height: 1px; background: var(--gold-lt);
        }
        .page-hero h2 {
            font-family: var(--ff-disp);
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300; font-style: italic;
            letter-spacing: -0.3px; line-height: 1.1; color: var(--paper);
        }
        .page-hero h2 strong { font-style: normal; font-weight: 600; color: var(--gold-lt); }
        .page-hero p {
            color: rgba(245,242,236,0.45); font-weight: 300;
            font-size: 0.975rem; margin-top: 0.6rem; max-width: 540px;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            max-width: var(--max-w); margin: 0 auto;
            padding: 1.75rem 2.5rem;
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            animation: fadeUp 0.6s 0.1s ease both;
        }
        .search-wrap {
            position: relative; flex: 1; min-width: 220px; max-width: 360px;
        }
        .search-wrap svg {
            position: absolute; left: 0.9rem; top: 50%;
            transform: translateY(-50%); color: rgba(245,242,236,0.3);
            pointer-events: none;
        }
        .search-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px;
            padding: 0.65rem 1rem 0.65rem 2.4rem;
            color: var(--paper); font-family: var(--ff-sans);
            font-size: 0.875rem; outline: none;
            transition: border-color var(--trans), box-shadow var(--trans);
        }
        .search-wrap input::placeholder { color: rgba(245,242,236,0.2); }
        .search-wrap input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
        }

        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-btn {
            padding: 0.55rem 1rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 6px;
            color: rgba(245,242,236,0.45);
            font-family: var(--ff-sans); font-size: 0.8rem; font-weight: 500;
            cursor: pointer;
            transition: all var(--trans);
        }
        .filter-btn:hover { color: var(--paper); background: rgba(255,255,255,0.05); }
        .filter-btn.active {
            background: var(--gold-dim); color: var(--gold-lt);
            border-color: rgba(184,134,11,0.35);
        }

        .result-count {
            margin-left: auto;
            font-size: 0.8rem; color: rgba(245,242,236,0.3); font-weight: 300;
        }
        .result-count span { color: var(--gold-lt); font-weight: 500; }

        /* ── GRID ── */
        .apartments-grid {
            max-width: var(--max-w); margin: 0 auto;
            padding: 2.5rem 2.5rem 5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
        }

        /* ── APARTMENT CARD ── */
        .apt-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: border-color var(--trans), transform var(--trans), box-shadow var(--trans);
            animation: fadeUp 0.5s ease both;
            cursor: pointer;
        }
        .apt-card:hover {
            border-color: rgba(184,134,11,0.4);
            transform: translateY(-5px);
            box-shadow: 0 20px 48px rgba(0,0,0,0.35);
        }

        /* Card image / colour band */
        .card-visual {
            height: 160px; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #1c1e19 0%, #252820 100%);
        }
        .card-visual::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(184,134,11,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184,134,11,0.07) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .card-visual .big-initial {
            position: absolute; bottom: -0.1em; right: 0.1em;
            font-family: var(--ff-disp); font-size: 9rem;
            font-weight: 600; font-style: italic;
            line-height: 1; color: rgba(255,255,255,0.04);
            user-select: none; pointer-events: none;
        }
        .card-visual .apt-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem; opacity: 0.6;
        }
        .card-visual .status-badge {
            position: absolute; top: 1rem; left: 1rem;
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 0.25rem 0.65rem; border-radius: 4px;
        }
        .status-badge.available {
            background: rgba(110,202,160,0.15);
            color: #6ecaa0;
            border: 1px solid rgba(110,202,160,0.25);
        }
        .status-badge.full {
            background: rgba(192,57,43,0.15);
            color: #e07070;
            border: 1px solid rgba(192,57,43,0.25);
        }
        /* accent line on hover */
        .card-visual::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
            transform: scaleX(0); transform-origin: left;
            transition: transform var(--trans);
        }
        .apt-card:hover .card-visual::after { transform: scaleX(1); }

        /* Card body */
        .card-body {
            padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 1rem;
        }
        .card-body h3 {
            font-family: var(--ff-disp); font-size: 1.45rem;
            font-weight: 600; color: var(--paper); line-height: 1.2;
        }
        .card-body .meta { display: flex; flex-direction: column; gap: 0.45rem; }
        .card-body .meta p {
            font-size: 0.83rem; color: rgba(245,242,236,0.45);
            font-weight: 300; display: flex; align-items: flex-start; gap: 0.45rem;
        }
        .card-body .meta p svg { flex-shrink: 0; margin-top: 2px; opacity: 0.5; }

        /* Room bar */
        .room-bar {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .room-bar-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.5rem;
        }
        .room-bar-top span { font-size: 0.78rem; color: rgba(245,242,236,0.35); font-weight: 300; }
        .room-bar-top strong { font-size: 0.78rem; color: var(--gold-lt); font-weight: 500; }
        .bar-track {
            height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
        }
        .bar-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--gold), var(--gold-lt));
            transition: width 0.8s cubic-bezier(.4,0,.2,1);
        }

        /* Card footer */
        .card-footer {
            padding: 1rem 1.5rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem;
        }
        .rooms-pill {
            font-size: 0.78rem; font-weight: 500;
            color: var(--gold-lt);
            background: var(--gold-dim);
            border: 1px solid rgba(184,134,11,0.22);
            padding: 0.3rem 0.75rem; border-radius: 20px;
        }
        .view-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            background: rgba(184,134,11,0.12);
            color: var(--gold-lt);
            border: 1px solid rgba(184,134,11,0.22);
            border-radius: 7px;
            font-family: var(--ff-sans); font-size: 0.82rem; font-weight: 500;
            cursor: pointer; transition: all var(--trans);
        }
        .view-btn:hover {
            background: var(--gold); color: var(--ink); border-color: var(--gold);
        }

        /* ── DETAIL MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(10,11,9,0.82);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            width: 100%; max-width: 580px;
            max-height: 90vh; overflow-y: auto;
            position: relative;
            transform: translateY(24px) scale(0.97);
            transition: transform 0.35s cubic-bezier(.4,0,.2,1);
        }
        .modal-overlay.open .modal { transform: none; }

        .modal-top {
            height: 180px; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #1c1e19 0%, #252820 100%);
            border-radius: 18px 18px 0 0;
        }
        .modal-top::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(184,134,11,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184,134,11,0.08) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .modal-top .big-initial {
            position: absolute; bottom: -0.1em; right: 0.1em;
            font-family: var(--ff-disp); font-size: 11rem;
            font-weight: 600; font-style: italic;
            line-height: 1; color: rgba(255,255,255,0.05);
            user-select: none;
        }
        .modal-top::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .modal-close {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: var(--paper); border-radius: 50%; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; line-height: 1;
            transition: background var(--trans);
        }
        .modal-close:hover { background: rgba(184,134,11,0.3); }

        .modal-body { padding: 2rem; }

        .modal-badge {
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 0.25rem 0.65rem; border-radius: 4px;
            display: inline-block; margin-bottom: 0.75rem;
        }

        .modal-body h2 {
            font-family: var(--ff-disp); font-size: 2rem;
            font-weight: 600; color: var(--paper); margin-bottom: 1.5rem;
        }

        .modal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .modal-stat {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; padding: 1rem;
        }
        .modal-stat .s-label {
            font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: rgba(245,242,236,0.35); margin-bottom: 0.35rem;
        }
        .modal-stat .s-value {
            font-family: var(--ff-disp); font-size: 1.6rem;
            font-weight: 600; color: var(--gold-lt); line-height: 1;
        }
        .modal-stat .s-sub {
            font-size: 0.75rem; color: rgba(245,242,236,0.35); margin-top: 0.2rem;
        }

        .modal-section-title {
            font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(245,242,236,0.35);
            margin-bottom: 0.75rem;
        }

        .rooms-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.75rem; }
        .room-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px; padding: 0.75rem 1rem;
            font-size: 0.85rem;
        }
        .room-row .rn { font-weight: 500; color: var(--paper); }
        .room-row .rs {
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 0.2rem 0.55rem; border-radius: 4px;
        }
        .rs.vacant  { background: rgba(110,202,160,0.12); color: #6ecaa0; }
        .rs.occupied{ background: rgba(192,57,43,0.12); color: #e07070; }

        .modal-actions {
            display: flex; gap: 0.75rem;
            padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .modal-actions .btn-primary {
            flex: 1; padding: 0.75rem;
            background: linear-gradient(135deg, var(--gold), #9a700a);
            color: var(--ink); font-family: var(--ff-sans);
            font-size: 0.875rem; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer;
            transition: opacity var(--trans), box-shadow var(--trans);
        }
        .modal-actions .btn-primary:hover {
            opacity: 0.88;
            box-shadow: 0 8px 24px rgba(184,134,11,0.3);
        }
        .modal-actions .btn-ghost {
            padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.04);
            color: rgba(245,242,236,0.55);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; font-family: var(--ff-sans);
            font-size: 0.875rem; font-weight: 500; cursor: pointer;
            transition: all var(--trans);
        }
        .modal-actions .btn-ghost:hover {
            color: var(--paper); background: rgba(255,255,255,0.08);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1/-1; text-align: center;
            padding: 5rem 2rem;
            color: rgba(245,242,236,0.3);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; font-weight: 300; }

        /* ── FOOTER ── */
        footer {
            position: relative; z-index: 1;
            border-top: 1px solid rgba(255,255,255,0.06);
            text-align: center; padding: 1.5rem;
            font-size: 0.8rem;
            color: rgba(245,242,236,0.22); font-weight: 300;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .navbar { padding: 0 1.25rem; }
            .nav-links { display: none; }
            .page-hero, .toolbar { padding-left: 1.25rem; padding-right: 1.25rem; }
            .apartments-grid { padding: 1.5rem 1.25rem 4rem; grid-template-columns: 1fr; }
            .modal-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav class="navbar">
            <div class="logo"><h1>P<span>-</span>rent</h1></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="apartments.html" class="active">Apartments</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="add-tenant.html">Add Tenant</a></li>
                <li><a href="login.html">Account</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- PAGE HERO -->
        <div class="page-hero">
            <div class="page-eyebrow">Properties</div>
            <h2>Our <strong>Apartments</strong></h2>
            <p>Browse available properties, check room availability, and view details before moving in.</p>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search apartments or location…" />
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="available">Available</button>
                <button class="filter-btn" data-filter="full">Fully Occupied</button>
            </div>
            <div class="result-count">Showing <span id="count-display">0</span> properties</div>
        </div>

        <!-- GRID -->
        <div class="apartments-grid" id="apartments-grid">
            <!-- JS renders cards here -->
        </div>
    </main>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal" id="modal">
            <div class="modal-top" id="modal-top">
                <span class="big-initial" id="modal-initial"></span>
                <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- populated by JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 P-rent Apartment Management System</p>
    </footer>

    <script src="js/apartments.js"></script>
</body>
</html>
